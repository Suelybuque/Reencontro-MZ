<!DOCTYPE html>
<html lang="pt-MZ">
<head>
  <meta charset="UTF-8">
  <title>Preview Style A - Electric Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap');
    
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #05050a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
    }
    
    .viewport-wrapper {
      position: relative;
      width: 1920px; height: 1080px;
      transform-origin: center center;
      background: radial-gradient(circle at 50% 0%, #1a1b35 0%, #05050a 70%);
      overflow: hidden;
    }

    .glow-sphere {
      position: absolute;
      width: 800px; height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, rgba(0,0,0,0) 70%);
      top: -200px; left: -200px;
      filter: blur(60px);
      animation: drift 10s infinite alternate ease-in-out;
    }
    .glow-sphere-2 {
      position: absolute;
      width: 1000px; height: 1000px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0,0,0,0) 70%);
      bottom: -300px; right: -200px;
      filter: blur(80px);
      animation: drift 15s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(100px, 100px); }
    }

    .content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 80%;
      z-index: 10;
    }

    .badge {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      color: #f97316;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    h1 {
      font-size: 160px;
      font-weight: 900;
      margin: 0;
      line-height: 0.9;
      letter-spacing: -4px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      text-transform: uppercase;
    }

    h1 span {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 48px;
      font-weight: 300;
      color: #94a3b8;
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .accent-line {
      width: 0;
      height: 4px;
      background: linear-gradient(90deg, #f97316, transparent);
      margin: 60px auto 0;
      animation: expandLine 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(60px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandLine {
      to { width: 300px; }
    }
  </style>
</head>
<body>
  <div class="viewport-wrapper">
    <div class="glow-sphere"></div>
    <div class="glow-sphere-2"></div>
    <div class="content">
      <div class="badge">Hackathon Cursor</div>
      <h1>Reencontro <span>MZ</span></h1>
      <h2>Reunir Famílias. Combater a Desinformação.</h2>
      <div class="accent-line"></div>
    </div>
  </div>

  <script>
    function scaleStage() {
      const wrapper = document.querySelector('.viewport-wrapper');
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      wrapper.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleStage);
    scaleStage();
  </script>
</body>
</html>
